name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod

      - name: Verify modules
        run: go mod verify

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run: gofmt -w ."
            gofmt -l .
            exit 1
          fi

      # - name: Vet
      #   run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: api

      - name: test
        run: go test -race -coverprofile=coverage.out ./api/... ./cli/... ./sdk/... ./plugins/platform-standards/...

      - name: coverage gate
        run: |
          go tool cover -func=coverage.out | \
            awk '/^total:/ { pct = $3+0; if (pct < 90) { print "Coverage " pct "% is below 90% threshold"; exit 1 } }'

  docker:
    name: Docker Build and Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: docker-build
        run: |
          make docker-build \
            VERSION=${{ github.ref_name }} \
            COMMIT=${{ github.sha }} \
            BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: postulate-api:local
          exit-code: "1"
          severity: CRITICAL
