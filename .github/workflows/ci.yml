name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Verify modules
        run: go mod verify
        working-directory: api

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: api

      - name: test
        run: go test -race -coverprofile=coverage.out ./...
        working-directory: api

      - name: coverage gate
        run: |
          go tool cover -func=coverage.out | \
            awk '/^total:/ { pct = $3+0; if (pct < 90) { print "Coverage " pct "% is below 90% threshold"; exit 1 } }'
        working-directory: api

      - name: migration file lint
        run: |
          for up in api/internal/migrate/migrations/*.up.sql; do
            down="${up%.up.sql}.down.sql"
            if [ ! -f "$down" ]; then
              echo "Missing down migration for: $up"
              exit 1
            fi
          done
          echo "✓ All migration files have matching up/down pairs"

  migrate:
    name: Migration Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postulate_dev
          POSTGRES_PASSWORD: postulate_dev
          POSTGRES_DB: postulate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install golang-migrate CLI
        run: make install-tools

      - name: migrate-up (first run)
        run: make migrate-up DB_URL="postgres://postulate_dev:postulate_dev@localhost:5432/postulate_test?sslmode=disable"

      - name: migrate-up (idempotency check)
        run: make migrate-up DB_URL="postgres://postulate_dev:postulate_dev@localhost:5432/postulate_test?sslmode=disable"

      - name: migrate-down-all
        run: migrate -path api/internal/migrate/migrations -database "postgres://postulate_dev:postulate_dev@localhost:5432/postulate_test?sslmode=disable" down -all

  docker:
    name: Docker Build and Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: docker-build
        run: |
          make docker-build \
            VERSION=${{ github.ref_name }} \
            COMMIT=${{ github.sha }} \
            BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: postulate-api:local
          exit-code: "1"
          severity: CRITICAL
