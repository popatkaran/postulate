# config.example.yaml — Postulate API server configuration reference
#
# Copy this file to config.yaml and adjust values for your environment.
# Any value can be overridden by a POSTULATE_* environment variable.
# Convention: server.port → POSTULATE_SERVER_PORT
#
# Required fields are marked with (required).
# Sensitive fields are marked with (sensitive) — never commit real values.

server:
  # (required) TCP port the HTTP server listens on. Integer 1–65535.
  # Override: POSTULATE_SERVER_PORT
  port: 8080

  # (required) Runtime environment. One of: development | staging | production.
  # Override: POSTULATE_SERVER_ENVIRONMENT
  environment: development

  # (required) Seconds to wait for in-flight requests to complete on shutdown.
  # Must be a positive integer.
  # Override: POSTULATE_SERVER_SHUTDOWN_TIMEOUT_SECONDS
  shutdown_timeout_seconds: 30

observability:
  # (required) Logical service name emitted in all logs, traces, and metrics.
  # Override: POSTULATE_OBSERVABILITY_SERVICE_ID
  service_id: postulate-api

  # (optional) Unique identifier for this instance. Populated from hostname if absent.
  # Override: POSTULATE_OBSERVABILITY_INSTANCE_ID
  instance_id: ""

  # (optional) OTLP gRPC endpoint for trace and metric export (e.g. localhost:4317).
  # Override: POSTULATE_OBSERVABILITY_OTLP_ENDPOINT
  otlp_endpoint: ""

  # (optional) Minimum log level. One of: debug | info | warn | error. Default: info.
  # Override: POSTULATE_OBSERVABILITY_LOG_LEVEL
  log_level: info

database:
  # (required) PostgreSQL host.
  host: localhost

  # (required) PostgreSQL port. Integer 1–65535.
  port: 5432

  # (required) Database name.
  name: postulate_dev

  # (required) Database user.
  user: postulate_dev

  # (required) (sensitive) Database password — never log this value.
  password: ""

  # (required) SSL mode. One of: disable | require | verify-full.
  ssl_mode: disable

  # (optional) Maximum number of open connections. Default: 25.
  max_open_conns: 25

  # (optional) Maximum number of idle connections. Default: 5.
  max_idle_conns: 5

  # (optional) Maximum connection lifetime in seconds. Default: 300.
  conn_max_lifetime_seconds: 300

auth:
  # (required) Google OAuth client ID.
  # Override: GOOGLE_CLIENT_ID
  google_client_id: ""

  # (required) (sensitive) Google OAuth client secret — never commit real values.
  # Override: GOOGLE_CLIENT_SECRET
  google_client_secret: ""

  # (required) GitHub OAuth client ID.
  # Override: GITHUB_CLIENT_ID
  github_client_id: ""

  # (required) (sensitive) GitHub OAuth client secret — never commit real values.
  # Override: GITHUB_CLIENT_SECRET
  github_client_secret: ""

  # (optional) Public base URL of this API, used to construct OAuth callback URLs.
  # Override: POSTULATE_BASE_URL
  base_url: "http://localhost:8080"

  # (required) (sensitive) HS256 JWT signing secret — minimum 32 bytes.
  # Override: POSTULATE_JWT_SECRET
  jwt_secret: ""
